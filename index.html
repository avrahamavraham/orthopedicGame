<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>orthopedic Game</title>
</head>
<body>
    <h1>Welcome to the Orthopedic Game!</h1>
    <p> yaw = <span id="yawValue">0</span> degrees</p>
    <script>
        function getYaw() {
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', function(event) {
                    var yaw = event.alpha; // Yaw angle in degrees
                    document.getElementById('yawValue').textContent = yaw.toFixed(2);
                }, true);
            } else {
                console.log('Device orientation not supported.');
            }
        }
    </script>
</body>
</html>
