<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מבוך דינאמי</title>
    <style>
        body {
            background-color: #000000;
            font-family: Arial, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            /* מניעת גלילה וחווית משחק חלקה יותר בנייד */
            overflow: hidden;
            touch-action: none; 
        }
        h1 {
            margin-bottom: 10px;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        select, button {
            padding: 8px 12px;
            font-size: 1rem;
            border-radius: 6px;
            border: 1px solid #888;
            background: #111;
            color: #fff;
            cursor: pointer;
        }
        #mazeContainer {
            display: grid;
            gap: 0;
            background: #111;
            padding: 10px;
            border: 2px solid #fff;
            max-width: calc(100vw - 40px);
            max-height: calc(100vh - 160px);
        }
        .cell {
            width: 18px;
            height: 18px;
            box-sizing: border-box;
            background: #000;
            position: relative;
        }
        .cell.start {
            background: #0a0;
        }
        .cell.end {
            background: #a00;
        }
        /* עיצוב השחקן כעיגול כחול */
        .cell.player::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 15%;
            width: 70%;
            height: 70%;
            background-color: #007bff;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <h1>מבוך דינאמי</h1>
    <div class="controls">
        <label for="difficulty">בחר קושי:</label>
        <select id="difficulty">
            <option value="easy">קל</option>
            <option value="medium">בינוני</option>
            <option value="hard">קשה</option>
        </select>
        <button onclick="startGame()">התחל משחק</button>
    </div>
    <div id="mazeContainer"></div>

    <script>
        // משתני מערכת גלובליים
        let currentMazeGrid = null;
        let playerPos = { row: 0, col: 0 };
        let lastMoveTime = 0;
        
        const MOVE_COOLDOWN = 200;  // מהירות תנועה (במילישניות) - ככל שנמוך יותר, השחקן יזוז מהר יותר
        const TILT_THRESHOLD = 12; // זווית הטיה מינימלית במעלות כדי להחשיב תנועה

        function startGame() {
            const difficulty = document.getElementById('difficulty').value;
            generateMaze(difficulty);
            
            // הפעלת חיישנים כולל טיפול בהרשאות של iOS (אייפון)
            initGyroscope();
        }

        function generateMaze(difficulty) {
            const size = getMazeSize(difficulty);
            const maze = createMaze(size, size);
            
            // שמירת המטריצה ואיפוס מיקום השחקן
            currentMazeGrid = maze;
            playerPos = { row: 0, col: 0 };
            
            renderMaze(maze);
        }

        function getMazeSize(difficulty) {
            switch (difficulty) {
                case 'hard':
                    return 31;
                case 'medium':
                    return 21;
                default:
                    return 15;
            }
        }

        function createMaze(rows, cols) {
            const grid = Array.from({ length: rows }, () =>
                Array.from({ length: cols }, () => ({
                    visited: false,
                    walls: { top: true, right: true, bottom: true, left: true }
                }))
            );

            const stack = [];
            const startRow = 0;
            const startCol = 0;
            grid[startRow][startCol].visited = true;
            stack.push({ row: startRow, col: startCol });

            while (stack.length > 0) {
                const current = stack[stack.length - 1];
                const neighbors = getUnvisitedNeighbors(current.row, current.col, grid);

                if (neighbors.length > 0) {
                    const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    removeWalls(current, next, grid);
                    grid[next.row][next.col].visited = true;
                    stack.push(next);
                } else {
                    stack.pop();
                }
            }

            grid[0][0].walls.top = false;
            grid[rows - 1][cols - 1].walls.bottom = false;
            return grid;
        }

        function getUnvisitedNeighbors(row, col, grid) {
            const neighbors = [];
            const directions = [
                { row: row - 1, col },
                { row, col: col + 1 },
                { row: row + 1, col },
                { row, col: col - 1 }
            ];

            directions.forEach(({ row: nextRow, col: nextCol }) => {
                if (
                    nextRow >= 0 &&
                    nextRow < grid.length &&
                    nextCol >= 0 &&
                    nextCol < grid[0].length &&
                    !grid[nextRow][nextCol].visited
                ) {
                    neighbors.push({ row: nextRow, col: nextCol });
                }
            });

            return neighbors;
        }

        function removeWalls(current, next, grid) {
            const x = current.col - next.col;
            const y = current.row - next.row;

            if (x === 1) {
                grid[current.row][current.col].walls.left = false;
                grid[next.row][next.col].walls.right = false;
            } else if (x === -1) {
                grid[current.row][current.col].walls.right = false;
                grid[next.row][next.col].walls.left = false;
            }

            if (y === 1) {
                grid[current.row][current.col].walls.top = false;
                grid[next.row][next.col].walls.bottom = false;
            } else if (y === -1) {
                grid[current.row][current.col].walls.bottom = false;
                grid[next.row][next.col].walls.top = false;
            }
        }

        function renderMaze(grid) {
            const container = document.getElementById('mazeContainer');
            const rows = grid.length;
            const cols = grid[0].length;
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(${cols}, 18px)`;

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${row}-${col}`; // מזהה ייחודי לכל משבצת לניהול תנועה חלקה
                    
                    const walls = grid[row][col].walls;
                    cell.style.borderTop = walls.top ? '2px solid #fff' : '2px solid transparent';
                    cell.style.borderRight = walls.right ? '2px solid #fff' : '2px solid transparent';
                    cell.style.borderBottom = walls.bottom ? '2px solid #fff' : '2px solid transparent';
                    cell.style.borderLeft = walls.left ? '2px solid #fff' : '2px solid transparent';

                    if (row === 0 && col === 0) {
                        cell.classList.add('start');
                        cell.classList.add('player'); // הגדרת מיקום התחלתי לשחקן
                    }
                    if (row === rows - 1 && col === cols - 1) {
                        cell.classList.add('end');
                    }

                    container.appendChild(cell);
                }
            }
        }

        function initGyroscope() {
            // בדיקה אם המכשיר דורש בקשת הרשאה מפורשת (מכשירי iOS 13+)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.removeEventListener('deviceorientation', handleOrientation);
                            window.addEventListener('deviceorientation', handleOrientation);
                        } else {
                            alert('כדי לשחק באמצעות הטיית הטלפון, יש לאשר גישה לחיישנים.');
                        }
                    })
                    .catch(error => {
                        console.error('שגיאה בקבלת הרשאת חיישנים:', error);
                    });
            } else {
                // למכשירים שלא דורשים הרשאה מיוחדת (אנדרואיד / דסקטופ בסימולטור)
                window.removeEventListener('deviceorientation', handleOrientation);
                window.addEventListener('deviceorientation', handleOrientation);
            }
        }

        function handleOrientation(event) {
            const gamma = event.gamma; // הטיה ימינה/שמאלה (ציר X)
            const beta = event.beta;   // הטיה קדימה/אחורה (ציר Y)

            if (gamma !== null && beta !== null) {
                MovePlayer(gamma, beta);
            }
        }

        function MovePlayer(gamma, beta) {
            if (!currentMazeGrid) return; // המשחק עוד לא התחיל או שכבר נגמר

            const now = Date.now();
            if (now - lastMoveTime < MOVE_COOLDOWN) return; // מניעת ריצה מהירה מדי של הלופ

            let moved = false;
            let newRow = playerPos.row;
            let newCol = playerPos.col;
            const currentCell = currentMazeGrid[playerPos.row][playerPos.col];

            // 1. בדיקת תנועה אנכית (קדימה / אחורה)
            if (beta > TILT_THRESHOLD && !currentCell.walls.bottom) {
                newRow++;
                moved = true;
            } else if (beta < -TILT_THRESHOLD && !currentCell.walls.top) {
                newRow--;
                moved = true;
            } 
            // 2. בדיקת תנועה אופקית (ימינה / שמאלה) - מתבצעת רק אם לא זזנו אנכית
            else if (gamma > TILT_THRESHOLD && !currentCell.walls.right) {
                newCol++;
                moved = true;
            } else if (gamma < -TILT_THRESHOLD && !currentCell.walls.left) {
                newCol--;
                moved = true;
            }

            if (moved) {
                // הסרת השחקן מהמיקום הקודם
                const oldCell = document.getElementById(`cell-${playerPos.row}-${playerPos.col}`);
                if (oldCell) oldCell.classList.remove('player');

                // עדכון מיקום בזיכרון
                playerPos.row = newRow;
                playerPos.col = newCol;

                // ציור השחקן במיקום החדש
                const newCell = document.getElementById(`cell-${playerPos.row}-${playerPos.col}`);
                if (newCell) newCell.classList.add('player');

                lastMoveTime = now;

                // בדיקת תנאי ניצחון (הגעה לתא האחרון במטריצה)
                if (playerPos.row === currentMazeGrid.length - 1 && playerPos.col === currentMazeGrid[0].length - 1) {
                    currentMazeGrid = null; // עצירת תנועה
                    setTimeout(() => {
                        alert('כל הכבוד! הצלחת לצאת מהמבוך! 🎉');
                    }, 150);
                }
            }
        }
    </script>
</body>
</html>
