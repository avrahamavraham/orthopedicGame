<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מבוך דינאמי</title>
    <style>
        body {
            background-color: #000000;
            font-family: Arial, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 {
            margin-bottom: 10px;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        select, button {
            padding: 8px 12px;
            font-size: 1rem;
            border-radius: 6px;
            border: 1px solid #888;
            background: #111;
            color: #fff;
        }
        #mazeContainer {
            display: grid;
            gap: 0;
            background: #111;
            padding: 10px;
            border: 2px solid #fff;
            max-width: calc(100vw - 40px);
        }
        .cell {
            width: 18px;
            height: 18px;
            box-sizing: border-box;
            background: #000;
        }
        .cell.end {
            background: #a00;
        }
        .cell.start {
            background: #0a0;
        }
        .cell.player {
            background-color: #007bff; /* צבע כחול לשחקן */
            border-radius: 50%; /* הופך את השחקן לעיגול במקום ריבוע */
            transform: scale(0.7); /* מקטין טיפה כדי שלא יסתיר את הקירות */
        }
    </style>
</head>
<body>
    <h1>מבוך דינאמי</h1>
    <div class="controls">
        <label for="difficulty">בחר קושי:</label>
        <select id="difficulty">
            <option value="easy">קל</option>
            <option value="medium">בינוני</option>
            <option value="hard">קשה</option>
        </select>
        <button onclick="startGame()">התחל משחק</button>
    </div>
    <div id="mazeContainer"></div>

    <script>
        let currentMazeGrid = null;
        let playerPos = { row: 0, col: 0 };
        let lastMoveTime = 0;
        const MOVE_COOLDOWN = 250; // אלפיות שנייה בין כל צעד - אפשר לשנות כדי להאיץ/להאט
        const TILT_THRESHOLD = 15; // זווית המינימום במעלות הנדרשת כדי לזוז
        function startGame() {
            const difficulty = document.getElementById('difficulty').value;
            generateMaze(difficulty);
            alert('המשחק מתחיל! נסה לנווט את המבוך הדינאמי.');
            resetGyro();
        }

        function generateMaze(difficulty) {
            const size = getMazeSize(difficulty);
            const maze = createMaze(size, size);

            currentMazeGrid = maze;
            playerPos = { row: 0, col: 0 };
            
            renderMaze(maze);
        }

        function getMazeSize(difficulty) {
            switch (difficulty) {
                case 'hard':
                    return 31;
                case 'medium':
                    return 21;
                default:
                    return 15;
            }
        }

        function createMaze(rows, cols) {
            const grid = Array.from({ length: rows }, () =>
                Array.from({ length: cols }, () => ({
                    visited: false,
                    walls: { top: true, right: true, bottom: true, left: true }
                }))
            );

            const stack = [];
            const startRow = 0;
            const startCol = 0;
            grid[startRow][startCol].visited = true;
            stack.push({ row: startRow, col: startCol });

            while (stack.length > 0) {
                const current = stack[stack.length - 1];
                const neighbors = getUnvisitedNeighbors(current.row, current.col, grid);

                if (neighbors.length > 0) {
                    const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    removeWalls(current, next, grid);
                    grid[next.row][next.col].visited = true;
                    stack.push(next);
                } else {
                    stack.pop();
                }
            }

            grid[0][0].walls.top = false;
            grid[rows - 1][cols - 1].walls.bottom = false;
            return grid;
        }

        function getUnvisitedNeighbors(row, col, grid) {
            const neighbors = [];
            const directions = [
                { row: row - 1, col, direction: 'top' },
                { row, col: col + 1, direction: 'right' },
                { row: row + 1, col, direction: 'bottom' },
                { row, col: col - 1, direction: 'left' }
            ];

            directions.forEach(({ row: nextRow, col: nextCol }) => {
                if (
                    nextRow >= 0 &&
                    nextRow < grid.length &&
                    nextCol >= 0 &&
                    nextCol < grid[0].length &&
                    !grid[nextRow][nextCol].visited
                ) {
                    neighbors.push({ row: nextRow, col: nextCol });
                }
            });

            return neighbors;
        }

        function removeWalls(current, next, grid) {
            const x = current.col - next.col;
            const y = current.row - next.row;

            if (x === 1) {
                grid[current.row][current.col].walls.left = false;
                grid[next.row][next.col].walls.right = false;
            } else if (x === -1) {
                grid[current.row][current.col].walls.right = false;
                grid[next.row][next.col].walls.left = false;
            }

            if (y === 1) {
                grid[current.row][current.col].walls.top = false;
                grid[next.row][next.col].walls.bottom = false;
            } else if (y === -1) {
                grid[current.row][current.col].walls.bottom = false;
                grid[next.row][next.col].walls.top = false;
            }
        }

        function renderMaze(grid) {
            const container = document.getElementById('mazeContainer');
            const rows = grid.length;
            const cols = grid[0].length;
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(${cols}, 18px)`;

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    cell.id = `cell-${row}-${col}`; // id for evrey cell

                    const walls = grid[row][col].walls;
                    cell.style.borderTop = walls.top ? '2px solid #fff' : '2px solid transparent';
                    cell.style.borderRight = walls.right ? '2px solid #fff' : '2px solid transparent';
                    cell.style.borderBottom = walls.bottom ? '2px solid #fff' : '2px solid transparent';
                    cell.style.borderLeft = walls.left ? '2px solid #fff' : '2px solid transparent';

                    if (row === 0 && col === 0) {
                        cell.classList.add('start');
                        cell.classList.add('player'); //starting position of the player
                    }
                    if (row === rows - 1 && col === cols - 1) {
                        cell.classList.add('end'); // exit cell win when player reach it
                    }

                    container.appendChild(cell);
                }
            }
        }
    function resetGyro() {
        if (window.DeviceOrientationEvent) {
                window.removeEventListener('deviceorientation', handleOrientation);
                window.addEventListener('deviceorientation', handleOrientation);
            }
        }
        function handleOrientation(event) {
            const gamma = event.gamma; // ימינה ושמאלה
            const beta = event.beta;   // קדימה ואחורה
            
            // מעביר את הנתונים לפונקציית התנועה
            MovePlayer(gamma, beta);
        }

        function MovePlayer(gamma, beta) {
            // safty check - maze didn't generate yet so dont do anything
            if (!currentMazeGrid) return;

            const now = Date.now();
            // check if enough time has passed since the last move to prevent too fast movement
            if (now - lastMoveTime < MOVE_COOLDOWN) return;

            let moved = false;
            let newRow = playerPos.row;
            let newCol = playerPos.col;
            const currentCell = currentMazeGrid[playerPos.row][playerPos.col];

            // check movement down (tilt forward) / up (tilt backward)
            if (beta > TILT_THRESHOLD && !currentCell.walls.bottom) {
                newRow++;
                moved = true;
            } else if (beta < -TILT_THRESHOLD && !currentCell.walls.top) {
                newRow--;
                moved = true;
            } 
            // check movement right (tilt right) / left (tilt left)
            else if (gamma > TILT_THRESHOLD && !currentCell.walls.right) {
                newCol++;
                moved = true;
            } else if (gamma < -TILT_THRESHOLD && !currentCell.walls.left) {
                newCol--;
                moved = true;
            }
            // if moved is legal (no wall and inside the maze) then update player position
            if (moved) {
                //delete player from current cell before moving to the new cell
                document.getElementById(`cell-${playerPos.row}-${playerPos.col}`).classList.remove('player');

                //update player position
                playerPos.row = newRow;
                playerPos.col = newCol;

                // מצייר את השחקן בתא החדש
                document.getElementById(`cell-${playerPos.row}-${playerPos.col}`).classList.add('player');
                
                // מעדכן את זמן התנועה האחרון
                lastMoveTime = now;

                // בדיקת ניצחון (הגעה לתא האחרון למטה-ימינה)
                if (playerPos.row === currentMazeGrid.length - 1 && playerPos.col === currentMazeGrid[0].length - 1) {
                    setTimeout(() => {
                        alert('כל הכבוד! סיימת את המבוך!');
                    }, 100); // השהייה קלה כדי שהשחקן יספיק לראות שהוא הגיע לסוף
                    currentMazeGrid = null; // עוצר את המשחק עד ללחיצה על "התחל" שוב
                }
            }
        }
    </script>
</body>
</html>
